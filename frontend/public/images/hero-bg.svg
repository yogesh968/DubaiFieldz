<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1B2B"/>
      <stop offset="0.55" stop-color="#0E0F16"/>
      <stop offset="1" stop-color="#102A2A"/>
    </linearGradient>
    <radialGradient id="r1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 220) rotate(35) scale(820 520)">
      <stop stop-color="white" stop-opacity="0.18"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 220) rotate(145) scale(760 520)">
      <stop stop-color="white" stop-opacity="0.14"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="white" stop-opacity="0.08"/>
      <stop offset="1" stop-color="white" stop-opacity="0.00"/>
    </linearGradient>
    <pattern id="p" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <rect width="18" height="18" fill="transparent"/>
      <rect width="2" height="18" fill="url(#stripe)"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#r1)"/>
  <rect width="1600" height="900" fill="url(#r2)"/>
  <rect width="1600" height="900" fill="url(#p)" opacity="0.55"/>

  <!-- Subtle stadium light glow -->
  <circle cx="1520" cy="70" r="220" fill="white" opacity="0.06"/>
  <circle cx="1520" cy="70" r="120" fill="white" opacity="0.08"/>
  <circle cx="80" cy="820" r="260" fill="white" opacity="0.04"/>
</svg>

